# .github/workflows/ml_cicd.yml
# ──────────────────────────────────────────────────────────────────────────────
# ML CI/CD Pipeline
# Triggers: push to main, PR to main, scheduled weekly retraining
# ──────────────────────────────────────────────────────────────────────────────

name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"    # Weekly retraining: every Monday 2 AM UTC

env:
  IMAGE_NAME: loan-default-api
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─── PHASE 1: CODE QUALITY ─────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest flake8

      - name: Lint with flake8
        run: flake8 src/ --max-line-length=100 --exclude=__pycache__

      - name: Run unit tests
        run: pytest src/tests/ -v --tb=short

  # ─── PHASE 2: MODEL TRAINING ───────────────────────────────────────────────
  train-model:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[retrain]')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML dependencies
        run: pip install -r requirements.txt

      - name: Download data
        run: |
          # In production: pull from S3 / GCS / Azure Blob
          echo "Downloading training data..."
          # aws s3 cp s3://your-bucket/data/train.csv data/processed/train.csv

      - name: Train model
        run: python scripts/train_pipeline.py

      - name: Evaluate model (gate)
        run: |
          python scripts/evaluate.py --min-auc 0.70 --min-f1 0.60
          echo "Model passed quality gate ✓"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/

  # ─── PHASE 3: BUILD DOCKER IMAGE ───────────────────────────────────────────
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
        continue-on-error: true    # Skip if no new model (code-only push)

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─── PHASE 4: CANARY DEPLOY ────────────────────────────────────────────────
  deploy-canary:
    name: Canary Deploy (10% traffic)
    runs-on: ubuntu-latest
    needs: build-image
    environment: production
    steps:
      - name: Deploy canary
        run: |
          echo "Deploying canary with 10% traffic split..."
          # kubectl set image deployment/ml-api-canary api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # OR docker stack deploy with updated docker-compose

      - name: Wait and validate canary (15 min)
        run: |
          sleep 900    # 15 minutes observation window
          python scripts/validate_canary.py --error-rate-threshold 0.05

  # ─── PHASE 5: FULL ROLLOUT ─────────────────────────────────────────────────
  deploy-production:
    name: Full Production Rollout
    runs-on: ubuntu-latest
    needs: deploy-canary
    environment: production
    steps:
      - name: Promote canary to stable
        run: |
          echo "Promoting canary → stable (100% traffic)..."
          # kubectl set image deployment/ml-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Notify team
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"✅ Loan Default Model deployed to production: ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
