version: "3.9"

services:
  # ─── ML API (Production) ─────────────────────────────
  ml-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ml-api
    ports:
      - "8000:8000"
    environment:
      API_KEY: ${API_KEY:-dev-secret}
      MODEL_PATH: /app/models/model.pkl
    volumes:
      - ../models:/app/models:ro
    restart: unless-stopped

  # ─── ML API (Canary) ────────────────────────────────
  ml-api-canary:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ml-api-canary
    ports:
      - "8001:8000"
    environment:
      API_KEY: ${API_KEY:-dev-secret}
      MODEL_PATH: /app/models/model_canary.pkl
    volumes:
      - ../models:/app/models:ro
    restart: unless-stopped

  # ─── NGINX (Traffic Split) ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ml-api
      - ml-api-canary
    restart: unless-stopped